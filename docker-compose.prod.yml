services:
  app:
    build: .
    container_name: applyflow-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://db:5432/applyflow
      DATABASE_USERNAME: applyflow
      DATABASE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      RATE_LIMIT_GLOBAL: ${RATE_LIMIT_GLOBAL:-100}
      RATE_LIMIT_AUTH: ${RATE_LIMIT_AUTH:-5}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      REMINDER_ENABLED: ${REMINDER_ENABLED:-false}
      REMINDER_STALE_DAYS: ${REMINDER_STALE_DAYS:-7}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    restart: unless-stopped
    networks:
      - applyflow-network

  nginx:
    image: nginx:1.25-alpine
    container_name: applyflow-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    restart: unless-stopped
    networks:
      - applyflow-network

  db:
    image: postgres:16-alpine
    container_name: applyflow-db
    environment:
      POSTGRES_DB: applyflow
      POSTGRES_USER: applyflow
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U applyflow" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    restart: unless-stopped
    networks:
      - applyflow-network

  redis:
    image: redis:7-alpine
    container_name: applyflow-redis
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    restart: unless-stopped
    networks:
      - applyflow-network

volumes:
  postgres-data:
  redis-data:

networks:
  applyflow-network:
    driver: bridge
